name: Code Security

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: code-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit-and-pip-audit:
    name: Bandit and pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies and scanners
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Bandit static security scan
        run: bandit -r app -ll

      - name: Run pip-audit dependency scan
        run: pip-audit -r requirements.txt
